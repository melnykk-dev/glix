<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">

  <rect width="1200" height="630" fill="#0D1B2A"/>
  <rect x="0" y="0" width="1200" height="4" fill="#E94560"/>
  <!-- subtle grid dots -->
  <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#E94560" opacity="0.07"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- mark -->
  <g transform="translate(120,195) scale(3.6)">
    <rect x="8"  y="8"  width="14" height="14" rx="2" fill="#E94560"/>
    <rect x="25" y="8"  width="14" height="14" rx="2" fill="#E94560"/>
    <rect x="42" y="8"  width="14" height="14" rx="2" fill="#E94560"/>
    <rect x="8"  y="25" width="14" height="14" rx="2" fill="#E94560"/>
    <rect x="8"  y="42" width="14" height="14" rx="2" fill="#E94560"/>
    <rect x="25" y="42" width="14" height="14" rx="2" fill="#533483"/>
    <rect x="42" y="42" width="14" height="14" rx="2" fill="#533483"/>
    <rect x="42" y="25" width="14" height="14" rx="2" fill="rgba(233,69,96,0.25)"/>
  </g>
  <!-- wordmark -->
  <text x="420" y="358" font-family="monospace" font-size="160" font-weight="500"
        fill="#F5F5F5" letter-spacing="-4">Glix</text>
  <!-- tagline -->
  <text x="120" y="490" font-family="monospace" font-size="28"
        fill="rgba(245,245,245,0.45)" letter-spacing="0">A local-first 2D game engine for the browser.</text>
  <!-- bottom accent -->
  <rect x="0" y="626" width="1200" height="4" fill="#533483"/>

</svg>